<div class="dav-card h-100">
  <div class="dav-card-body">
    <h6 class="fw-bold mb-3">{{ titulo }}</h6>
    {% if filas %}
    <table class="table table-sm mb-0">
      <tbody>
        {% for label, total in filas %}
        <tr>
          <td>{{ label }}</td>
          <td class="text-end fw-semibold">{{ total }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
      <p class="text-muted small">Sin datos.</p>
    {% endif %}
  </div>
</div>
